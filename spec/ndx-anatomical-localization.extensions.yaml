groups:
  - neurodata_type_def: Localization
    neurodata_type_inc: LabMetaData
    name: localization
    doc: "A class for storing anatomical localization information"
    groups:
      - neurodata_type_inc: AnatomicalCoordinatesTable
        quantity: "*"
        doc: "A table for storing localization in a space"
      - neurodata_type_inc: Space
        quantity: "*"
        doc: "A space in which the coordinates are defined"
      - neurodata_type_inc: AnatomicalCoordinatesImage
        quantity: "*"
        doc: "An container for storing localization of a field of view in a space"
      - neurodata_type_inc: BrainRegionMasks
        quantity: "*"
        doc: "A table for storing brain region masks to extract activity from specific brain regions."
  - neurodata_type_def: Space
    neurodata_type_inc: NWBContainer
    doc: "a space"
    attributes:
      - name: "space_name"
        doc: "name of the space"
        dtype: text
        required: true
      - name: origin
        doc: "A description of where (0,0,0) is in the space. For example, 'bregma' is a common origin for mice."
        dtype: text
        required: true
      - name: units
        doc: "The units of measurement for the x,y,z coordinates. For example, 'mm' for millimeters."
        dtype: text
        required: true
      - name: orientation
        doc:
          "A 3-letter string indicating the positive direction along each axis, where the 1st letter
          is for x, 2nd for y, and 3rd for z. Each letter can be: A (Anterior), P (Posterior), L (Left),
          R (Right), S (Superior/Dorsal), or I (Inferior/Ventral). The three letters must cover all three
          anatomical dimensions (one from A/P, one from L/R, one from S/I). For example, 'RAS' means
          positive x is Right, positive y is Anterior, positive z is Superior. Notes: (1) These three
          dimensions are also commonly referred to as AP, ML, and DV. (2) This convention specifies
          positive directions (sometimes written as 'RAS+'), not origin location - use the 'origin' field
          to describe where (0,0,0) is located."
        dtype: text
        required: true
    datasets:
      - name: extent
        doc:
          "The spatial extent (bounding box dimensions) of the coordinate space as [x, y, z].
          For corner-origin spaces like Allen CCF, this specifies the atlas dimensions.
          Units match the 'units' attribute. Optional - may be None for landmark-centered atlases."
        dtype: float64
        dims:
          - num_dimensions
        shape:
          - 3
        quantity: "?"
  - neurodata_type_def: AllenCCFv3Space
    neurodata_type_inc: Space
    doc:
      "The Allen Mouse Brain Common Coordinate Framework version 3 (2020). This canonical space uses PIR orientation
      (positive x=Posterior, positive y=Inferior, positive z=Right) with 10 micrometer resolution.
      The origin (0,0,0) is at the anterior-superior-left corner of the 3D image volume."
    attributes:
      - name: space_name
        dtype: text
        value: AllenCCFv3
        doc: "Name of the space (fixed to AllenCCFv3)"
      - name: origin
        dtype: text
        value: Anterior-Superior-Left (ASL) corner of the 3D image volume
        doc: "Origin of the coordinate system (fixed)"
      - name: units
        dtype: text
        value: um
        doc: "Units of measurement (fixed to micrometers)"
      - name: orientation
        dtype: text
        value: PIR
        doc: "Orientation of the coordinate system (fixed to PIR, indicating positive axis directions)"
    datasets:
      - name: extent
        dtype: float64
        dims:
          - num_dimensions
        shape:
          - 3
        value: [13200.0, 8000.0, 11400.0]
        doc: "Atlas extent in micrometers: [AP=13200, DV=8000, ML=11400]"
  - neurodata_type_def: D99v2Space
    neurodata_type_inc: Space
    doc:
      "The D99 macaque brain atlas version 2.0 (Reveley et al. 2017; Saleem et al. 2021).
      This canonical space uses RAS orientation (positive x=Right, positive y=Anterior, positive z=Superior)
      with millimeter units. The origin (0,0,0) is at the anterior commissure."
    attributes:
      - name: space_name
        dtype: text
        value: D99v2
        doc: "Name of the space (fixed to D99v2)"
      - name: origin
        dtype: text
        value: "Anterior commissure (AC). Horizontal plane aligned to the AC-PC line (anterior commissure to posterior commissure)."
        doc: "Origin of the coordinate system (fixed)"
      - name: units
        dtype: text
        value: mm
        doc: "Units of measurement (fixed to millimeters)"
      - name: orientation
        dtype: text
        value: RAS
        doc: "Orientation of the coordinate system (fixed to RAS, indicating positive axis directions)"
  - neurodata_type_def: NMTv2Space
    neurodata_type_inc: Space
    doc:
      "The NIMH Macaque Template version 2.0 symmetric (Jung et al. 2021).
      This canonical space uses RAS orientation (positive x=Right, positive y=Anterior, positive z=Superior)
      with millimeter units. The origin (0,0,0) is at ear bar zero."
    attributes:
      - name: space_name
        dtype: text
        value: NMTv2
        doc: "Name of the space (fixed to NMTv2)"
      - name: origin
        dtype: text
        value: "Ear bar zero (EBZ): intersection of the midsagittal plane and the interaural line. Horizontal plane aligned to the Horsley-Clarke stereotaxic convention."
        doc: "Origin of the coordinate system (fixed)"
      - name: units
        dtype: text
        value: mm
        doc: "Units of measurement (fixed to millimeters)"
      - name: orientation
        dtype: text
        value: RAS
        doc: "Orientation of the coordinate system (fixed to RAS, indicating positive axis directions)"
  - neurodata_type_def: MEBRAINSSpace
    neurodata_type_inc: Space
    doc:
      "The MEBRAINS macaque brain atlas version 1.0 (Balan et al. 2024).
      This canonical space uses RAS orientation (positive x=Right, positive y=Anterior, positive z=Superior)
      with millimeter units. The origin (0,0,0) is at the anterior commissure."
    attributes:
      - name: space_name
        dtype: text
        value: MEBRAINS
        doc: "Name of the space (fixed to MEBRAINS)"
      - name: origin
        dtype: text
        value: "Anterior commissure (AC). Horizontal plane approximately aligned to the Horsley-Clarke convention."
        doc: "Origin of the coordinate system (fixed)"
      - name: units
        dtype: text
        value: mm
        doc: "Units of measurement (fixed to millimeters)"
      - name: orientation
        dtype: text
        value: RAS
        doc: "Orientation of the coordinate system (fixed to RAS, indicating positive axis directions)"
  - neurodata_type_def: AnatomicalCoordinatesTable
    neurodata_type_inc: DynamicTable
    doc: "A table for storing anatomical coordinates for rows of another table determined using a single method"
    links:
      - target_type: Space
        quantity: 1
        doc: "The space in which the coordinates are defined"
        name: space
    attributes:
      - name: method
        doc: "The method used to determine the coordinates"
        dtype: text
        required: true
    datasets:
      - name: x
        neurodata_type_inc: VectorData
        doc: "The x coordinate"
        quantity: 1
      - name: "y"
        neurodata_type_inc: VectorData
        doc: "The y coordinate"
        quantity: 1
      - name: z
        neurodata_type_inc: VectorData
        doc: "The z coordinate"
        quantity: 1
      - name: localized_entity
        neurodata_type_inc: DynamicTableRegion
        doc: "A reference to the object being localized (e.g. electrode)"
        quantity: 1
      - name: brain_region
        neurodata_type_inc: VectorData
        doc: "The brain region associated with the localization"
        dtype: text
        quantity: "?"

  - neurodata_type_def: AnatomicalCoordinatesImage
    neurodata_type_inc: NWBContainer
    doc: "Image with Coordinates per Pixel. Each pixel stores its coordinates (x, y, z). Thus, x[i, j], y[i, j], z[i, j] give the atlas location for pixel (i, j)"
    links:
      - target_type: Space
        quantity: 1
        doc: "The space in which the coordinates are defined"
        name: space
      - target_type: Image
        quantity: 1
        doc: "The reference image (e.g. mean or max projection) on which the coordinate map is based"
        name: image
      - target_type: ImageSeries
        quantity: "?"
        doc: "The imaging series (OnePhotonSeries or TwoPhotonSeries) that this coordinate map applies to"
        name: localized_entity
    attributes:
      - name: method
        doc: "The method used to determine the coordinates"
        dtype: text
        required: true
      - name: description
        doc: "A description of the anatomical coordinates image"
        dtype: text
        required: false
    datasets:
      - name: x
        dtype: float32
        dims:
          - - width
            - height
        shape:
          - - null
            - null
        doc: 2D array containing X coordinates for each pixel (width x height) #TODO update to (height x width) once NWB schema is updated
        quantity: 1
      - name: y
        dtype: float32
        dims:
          - - width
            - height
        shape:
          - - null
            - null
        doc: 2D array containing Y coordinates for each pixel (width x height) #TODO update to (height x width) once NWB schema is updated
        quantity: 1
      - name: z
        dtype: float32
        dims:
          - - width
            - height
        shape:
          - - null
            - null
        doc: 2D array containing Z coordinates for each pixel (width x height) #TODO update to (height x width) once NWB schema is updated
        quantity: 1

      - name: brain_region
        dtype: text
        dims:
          - - width
            - height
        shape:
          - - null
            - null
        doc: 2D array of brain region names for each pixel
        quantity: "?"


  - neurodata_type_def: Landmarks
    neurodata_type_inc: DynamicTable
    doc: |
      Spatial landmarks annotated on an image with their pixel coordinates in both
      source and transformed spaces.
    datasets:
      - name: source_x
        neurodata_type_inc: VectorData
        dtype: float32
        doc: "Pixel x-coordinate of the landmark in the source space."
      - name: source_y
        neurodata_type_inc: VectorData
        dtype: float32
        doc: "Pixel y-coordinate of the landmark in the source space."
      - name: registered_x
        neurodata_type_inc: VectorData
        dtype: float32
        doc: "Pixel x-coordinate of the landmark in the registered space. This is the transformed result of applying the spatial transformation to the source coordinates."
        quantity: "?"
      - name: registered_y
        neurodata_type_inc: VectorData
        dtype: float32
        doc: "Pixel y-coordinate of the landmark in the registered space. This is the transformed result of applying the spatial transformation to the source coordinates."
        quantity: "?"
      - name: reference_x
        neurodata_type_inc: VectorData
        dtype: float32
        doc: "Pixel x-coordinate of the landmark in the reference atlas space."
        quantity: "?"
      - name: reference_y
        neurodata_type_inc: VectorData
        dtype: float32
        doc: "Pixel y-coordinate of the landmark in the reference atlas space."
        quantity: "?"
      - name: landmark_labels
        neurodata_type_inc: VectorData
        dtype: text
        doc: "The labels or names for each landmark."
        quantity: "?"
      - name: confidence
        neurodata_type_inc: VectorData
        dtype: float32
        doc: "The confidence scores in the range [0, 1] for each landmark correspondence."
        quantity: "?"

  - neurodata_type_def: AffineTransformation
    neurodata_type_inc: NWBContainer
    doc: |
      Affine transformation mapping from lab (imaging) space to atlas space.
      Given a pixel coordinate in the source image, applying the affine matrix yields
      the corresponding coordinate in the reference atlas space.
      For 2D: 6 DOF (rotation, translation, scaling, shearing)
    datasets:
      - name: affine_matrix
        dtype: float64
        dims:
          - - rows
            - cols
        shape:
          - - 3
            - 3
        doc: |
          Affine transformation matrix in homogeneous coordinates.
          Shape: (3, 3) for 2D.
          Last row is [0, 0, ..., 1] for homogeneous representation.
        quantity: 1

  - neurodata_type_def: BrainRegionMasks
    neurodata_type_inc: DynamicTable
    doc: |
      A table storing per-pixel brain region assignments, where each row represents
      a pixel identified by its (x, y) coordinate and the ID of the atlas region it
      belongs to. The masks can be used to extract brain-region-specific activity 
      time courses from widefield or two-photon calcium imaging by averaging the 
      corresponding pixels in the raw or processed video for all rows 
      of a region of interest. It can also be used to store the result of 
      projecting atlas region boundaries back onto the imaging field of view 
      when the full coordinate field is not available.

    datasets:
      - name: "x"
        neurodata_type_inc: VectorData
        dtype: int32
        doc: "Pixel x-coordinate."
      - name: "y"
        neurodata_type_inc: VectorData
        dtype: int32
        doc: "Pixel y-coordinate."
      - name: brain_region_id
        neurodata_type_inc: VectorData
        dtype: int32
        doc: "Brain region IDs for each pixel (corresponding to atlas ontology)."

  - neurodata_type_def: AtlasRegistration
    neurodata_type_inc: LabMetaData
    name: atlas_registration
    doc: "A class for storing atlas registration processing for a FOV."
    links:
      - target_type: Image
        name: source_image
        quantity: 1
        doc: "Image representing the source FOV (e.g. mean image, maximum projection, etc.)."
      - target_type: Image
        name: registered_image
        quantity: "?"
        doc: "Image representing the registered FOV. This is the image after applying the spatial transformation to the source image."
      - target_type: Image
        name: atlas_projection
        quantity: "?"
        doc: "The atlas projection image used as reference in the registration."
    groups:
      - neurodata_type_inc: AffineTransformation
        quantity: "?"
        doc: "A spatial transformation used in the registration."
      - neurodata_type_inc: Landmarks
        quantity: "?"
        doc: "Landmarks used in the registration."